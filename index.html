<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>Navbar</title>
</head>

<body>

    <nav>
        <div class="navbar-container">

            <!-- Logo + Organization Name -->
            <a href="#" class="logo">
                <img src="Assets/Logo.png" alt="Logo">
                <span class="org-name">Everest Academy</span>
            </a>

            <!-- Navigation Menu -->
            <ul class="nav-menu" id="navMenu">
                <li><a href="#">Home</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Facilities</a></li>
                <li><a href="#">Notices</a></li>
                <li><a class="contactUsbnav" href="#">Contact Us</a></li>
            </ul>

            <!-- Hamburger -->
            <button class="menu-toggle" id="menuToggle">Menu</button>

        </div>
    </nav>
    <div id="hero-container">
        <img src="Assets/image.svg" alt="Hero Image">
        <h2>Shaping Minds. Building Futures.</h2>
        <p>Empowering students with knowledge, discipline, and confidence to succeed in a rapidly changing world.</p>
    </div>
    <div class="stats-wrapper">
  <div class="stats-grid">

    <div class="stat-item">
      <div class="stat-number">350+</div>
      <div class="stat-label">Current students</div>
    </div>

    <div class="stat-item border-left">
      <div class="stat-number">100+</div>
      <div class="stat-label">Teachers</div>
    </div>

    <div class="stat-item border-top">
      <div class="stat-number">44</div>
      <div class="stat-label">Years of excellence</div>
    </div>

    <div class="stat-item border-left border-top">
      <div class="stat-number">5k+</div>
      <div class="stat-label">Alumni</div>
    </div>

  </div>
</div>
    <script src="script.js"></script>
</body>

</html>
